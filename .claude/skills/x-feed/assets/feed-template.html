<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Feed - {{GENERATED_DATE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    color: #e7e9ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    border-left: 1px solid #2f3336;
    border-right: 1px solid #2f3336;
    min-height: 100vh;
  }

  .feed-header {
    position: sticky;
    top: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #2f3336;
    padding: 12px 16px;
    z-index: 100;
  }

  .feed-header h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .feed-meta {
    font-size: 13px;
    color: #71767b;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .filter-btn {
    background: transparent;
    color: #71767b;
    border: 1px solid #2f3336;
    border-radius: 9999px;
    padding: 6px 16px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    background: #16181c;
    color: #e7e9ea;
  }

  .filter-btn.active {
    background: #e7e9ea;
    color: #000000;
    border-color: #e7e9ea;
  }

  .card {
    border-bottom: 1px solid #2f3336;
    padding: 16px;
    transition: background 0.2s;
  }

  .card:hover {
    background: #080808;
  }

  .card[data-stars="3"] {
    border-left: 3px solid #ffd700;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .source-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    color: #ffffff;
  }

  .source-badge.hatena { background: #00a4de; }
  .source-badge.hn { background: #ff6600; }
  .source-badge.reddit-tech { background: #ff4500; }
  .source-badge.reddit-fitness { background: #ff4500; }
  .source-badge.paleo { background: #4caf50; }
  .source-badge.pubmed { background: #326599; }
  .source-badge.claude-code { background: #d97706; }

  .stars {
    color: #ffd700;
    font-size: 14px;
    font-weight: 700;
  }

  .metric {
    color: #71767b;
    font-size: 13px;
    margin-left: auto;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .card-title a {
    color: #e7e9ea;
    text-decoration: none;
  }

  .card-title a:hover {
    text-decoration: underline;
  }

  .card-body {
    position: relative;
  }

  .card-text {
    font-size: 14px;
    color: #71767b;
    line-height: 1.6;
    overflow: hidden;
  }

  .card-text.collapsed {
    display: -webkit-box;
    -webkit-box-orient: vertical;
  }

  .expand-btn {
    background: none;
    border: none;
    color: #1d9bf0;
    font-size: 14px;
    cursor: pointer;
    padding: 4px 0;
    margin-top: 4px;
  }

  .expand-btn:hover {
    text-decoration: underline;
  }

  .card-footer {
    margin-top: 8px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .category-tag {
    font-size: 12px;
    color: #1d9bf0;
    background: rgba(29, 155, 240, 0.1);
    padding: 2px 10px;
    border-radius: 9999px;
  }

  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: #71767b;
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 600px) {
    .container {
      border-left: none;
      border-right: none;
    }
  }
</style>
</head>
<body>
<div class="container">
  <header class="feed-header">
    <h1>Trend Feed</h1>
    <div class="feed-meta">{{GENERATED_DATE}} / {{TOTAL_COUNT}} articles</div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="3">★★★</button>
      <button class="filter-btn" data-filter="2">★★</button>
      <button class="filter-btn" data-filter="1">★</button>
      <button class="filter-btn" data-filter="0">Other</button>
    </div>
  </header>
  <main id="feed">
{{FEED_ITEMS}}
  </main>
</div>
<script>
(function() {
  // Filter
  const filterBtns = document.querySelectorAll('.filter-btn');
  const cards = document.querySelectorAll('.card');

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      cards.forEach(card => {
        if (filter === 'all' || card.dataset.stars === filter) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    });
  });

  // Collapse
  cards.forEach(card => {
    const textEl = card.querySelector('.card-text');
    if (!textEl) return;
    const fullText = textEl.textContent;
    const maxChars = 480;
    if (fullText.length <= maxChars) return;

    const truncated = fullText.slice(0, maxChars) + '...';
    textEl.textContent = truncated;
    textEl.classList.add('collapsed');
    textEl.dataset.full = fullText;
    textEl.dataset.truncated = truncated;

    const btn = document.createElement('button');
    btn.className = 'expand-btn';
    btn.textContent = '\u7D9A\u304D\u3092\u8AAD\u3080';
    btn.addEventListener('click', () => {
      const isCollapsed = textEl.classList.contains('collapsed');
      if (isCollapsed) {
        textEl.textContent = textEl.dataset.full;
        textEl.classList.remove('collapsed');
        btn.textContent = '\u305F\u305F\u3080';
      } else {
        textEl.textContent = textEl.dataset.truncated;
        textEl.classList.add('collapsed');
        btn.textContent = '\u7D9A\u304D\u3092\u8AAD\u3080';
      }
    });
    textEl.parentNode.appendChild(btn);
  });
})();
</script>
</body>
</html>
