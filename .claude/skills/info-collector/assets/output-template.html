<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレンド情報 YYYY-MM-DD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    color: #e7e9ea;
    font-family: system-ui, -apple-system, sans-serif;
    line-height: 1.6;
  }

  /* ヘッダー */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #2f3336;
    padding: 12px 0;
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* カテゴリタブ */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .tab {
    background: transparent;
    color: #71767b;
    border: 1px solid #2f3336;
    border-radius: 9999px;
    padding: 4px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover {
    background: #16181c;
    color: #e7e9ea;
  }

  .tab.active {
    background: #e7e9ea;
    color: #0f1419;
    border-color: #e7e9ea;
  }

  /* ソートボタン */
  .sort-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .sort-bar span {
    color: #71767b;
    font-size: 13px;
  }

  .sort-btn {
    background: transparent;
    color: #1d9bf0;
    border: 1px solid #1d9bf0;
    border-radius: 9999px;
    padding: 3px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sort-btn:hover, .sort-btn.active {
    background: #1d9bf0;
    color: #fff;
  }

  /* フィードコンテナ */
  #feed {
    max-width: 680px;
    margin: 0 auto;
  }

  /* セクションヘッダー */
  .section-header {
    padding: 16px;
    border-bottom: 1px solid #2f3336;
    background: #16181c;
  }

  .section-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: #e7e9ea;
  }

  /* カード */
  .card {
    padding: 16px;
    border-bottom: 1px solid #2f3336;
    transition: background 0.2s;
  }

  .card:hover {
    background: #080808;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  /* ソースタグ */
  .source-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .source-tag.hatena { background: #00a4de; color: #fff; }
  .source-tag.hn { background: #ff6600; color: #fff; }
  .source-tag.reddit { background: #ff4500; color: #fff; }
  .source-tag.zenn { background: #3ea8ff; color: #fff; }
  .source-tag.devto { background: #0a0a0a; color: #3b49df; border: 1px solid #3b49df; }
  .source-tag.pubmed { background: #326599; color: #fff; }
  .source-tag.paleo { background: #4caf50; color: #fff; }
  .source-tag.claude { background: #d97706; color: #fff; }

  /* 星バッジ */
  .star-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .star-3 { color: #ffd700; background: rgba(255, 215, 0, 0.15); }
  .star-2 { color: #c0c0c0; background: rgba(192, 192, 192, 0.15); }
  .star-1 { color: #71767b; background: rgba(113, 118, 123, 0.15); }

  /* カテゴリラベル */
  .category-label {
    font-size: 12px;
    color: #1d9bf0;
  }

  /* エンゲージメント */
  .engagement {
    font-size: 12px;
    color: #71767b;
    margin-left: auto;
  }

  /* カードタイトル */
  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .card-title a {
    color: #e7e9ea;
    text-decoration: none;
  }

  .card-title a:hover {
    text-decoration: underline;
  }

  /* カードボディ（本文） */
  .card-body {
    font-size: 14px;
    color: #b0b3b8;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .card-body.collapsed {
    max-height: 12em;
    overflow: hidden;
    position: relative;
  }

  .card-body.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3em;
    background: linear-gradient(transparent, #000000);
    pointer-events: none;
  }

  .card-body.expanded {
    max-height: none;
    overflow: visible;
  }

  /* 続きを読むボタン */
  .read-more-btn {
    display: block;
    background: transparent;
    color: #1d9bf0;
    border: none;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 0 4px;
    font-weight: 600;
  }

  .read-more-btn:hover {
    text-decoration: underline;
  }

  /* カードフッター */
  .card-footer {
    margin-top: 10px;
    padding-top: 8px;
  }

  .source-link {
    color: #1d9bf0;
    font-size: 13px;
    text-decoration: none;
    word-break: break-all;
  }

  .source-link:hover {
    text-decoration: underline;
  }

  /* レスポンシブ */
  @media (max-width: 700px) {
    .header-inner, #feed {
      padding: 0 12px;
    }
  }

  /* 記事カウント */
  .article-count {
    color: #71767b;
    font-size: 13px;
    padding: 12px 16px;
    border-bottom: 1px solid #2f3336;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>トレンド情報 YYYY-MM-DD</h1>
    <div class="tabs">
      <button class="tab active" onclick="filterByCategory('all')">全て</button>
      <button class="tab" onclick="filterByCategory('app-growth')">アプリグロース</button>
      <button class="tab" onclick="filterByCategory('ux')">UX</button>
      <button class="tab" onclick="filterByCategory('ai-dev')">AI開発</button>
      <button class="tab" onclick="filterByCategory('rn-expo')">RN/Expo</button>
      <button class="tab" onclick="filterByCategory('nestjs-backend')">NestJS</button>
      <button class="tab" onclick="filterByCategory('data-analytics')">データ分析</button>
      <button class="tab" onclick="filterByCategory('dev-productivity')">開発生産性</button>
      <button class="tab" onclick="filterByCategory('business')">ビジネス</button>
      <button class="tab" onclick="filterByCategory('tech-general')">技術全般</button>
      <button class="tab" onclick="filterByCategory('fitness')">フィットネス</button>
      <button class="tab" onclick="filterByCategory('nutrition')">栄養</button>
      <button class="tab" onclick="filterByCategory('sleep')">睡眠</button>
      <button class="tab" onclick="filterByCategory('health-science')">健康科学</button>
    </div>
    <div class="sort-bar">
      <span>ソート:</span>
      <button class="sort-btn active" onclick="sortByStars(this)">★優先</button>
      <button class="sort-btn" onclick="sortByEngagement(this)">人気順</button>
      <button class="sort-btn" onclick="sortBySource(this)">ソース順</button>
    </div>
  </div>
</div>

<div class="article-count" id="article-count">全 0 件</div>

<div id="feed">
  <!-- ここに各記事カードを追加 -->

  <!--
  カードのテンプレート（1記事分）:

  <article class="card"
           data-category="カテゴリID"
           data-star="3"
           data-source="ソースID"
           data-engagement="数値">
    <div class="card-header">
      <span class="source-tag ソースクラス">ソース名</span>
      <span class="star-badge star-3">★★★</span>
      <span class="category-label">カテゴリ名</span>
      <span class="engagement">XXXpt</span>
    </div>
    <h3 class="card-title">
      <a href="URL" target="_blank" rel="noopener">記事タイトル</a>
    </h3>
    <div class="card-body">
      記事本文またはメモ（★★★記事は全文、それ以外は概要）
    </div>
    <div class="card-footer">
      <a href="URL" target="_blank" rel="noopener" class="source-link">元記事を開く</a>
    </div>
  </article>

  data-category値:
    app-growth, ux, ai-dev, rn-expo, dev-productivity, business, tech-general,
    nestjs-backend, data-analytics,
    fitness, nutrition, sleep, health-science

  data-source値:
    claude, hatena, hn, reddit, zenn, devto, paleo, pubmed

  source-tagクラス:
    claude, hatena, hn, reddit, zenn, devto, paleo, pubmed

  star-badgeクラス:
    star-3 (★★★), star-2 (★★), star-1 (★)
  -->
</div>

<script>
  // カテゴリフィルタ
  function filterByCategory(category) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    const cards = document.querySelectorAll('.card');
    let visibleCount = 0;
    cards.forEach(card => {
      const show = category === 'all' || card.dataset.category === category;
      card.style.display = show ? 'block' : 'none';
      if (show) visibleCount++;
    });
    document.getElementById('article-count').textContent =
      category === 'all' ? `全 ${cards.length} 件` : `${visibleCount} / ${cards.length} 件`;
  }

  // ★ソート
  function sortByStars(btn) {
    setActiveSort(btn);
    const container = document.getElementById('feed');
    const cards = [...container.querySelectorAll('.card')];
    cards.sort((a, b) => {
      const starDiff = Number(b.dataset.star) - Number(a.dataset.star);
      if (starDiff !== 0) return starDiff;
      return Number(b.dataset.engagement) - Number(a.dataset.engagement);
    });
    cards.forEach(card => container.appendChild(card));
  }

  // 人気順ソート
  function sortByEngagement(btn) {
    setActiveSort(btn);
    const container = document.getElementById('feed');
    const cards = [...container.querySelectorAll('.card')];
    cards.sort((a, b) => Number(b.dataset.engagement) - Number(a.dataset.engagement));
    cards.forEach(card => container.appendChild(card));
  }

  // ソース順ソート
  function sortBySource(btn) {
    setActiveSort(btn);
    const sourceOrder = ['claude', 'hatena', 'hn', 'reddit', 'zenn', 'devto', 'paleo', 'pubmed'];
    const container = document.getElementById('feed');
    const cards = [...container.querySelectorAll('.card')];
    cards.sort((a, b) => {
      const srcDiff = sourceOrder.indexOf(a.dataset.source) - sourceOrder.indexOf(b.dataset.source);
      if (srcDiff !== 0) return srcDiff;
      return Number(b.dataset.star) - Number(a.dataset.star);
    });
    cards.forEach(card => container.appendChild(card));
  }

  function setActiveSort(btn) {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // 続きを読む（CSS max-height方式）
  document.addEventListener('DOMContentLoaded', () => {
    // 記事カウント更新
    const totalCards = document.querySelectorAll('.card').length;
    document.getElementById('article-count').textContent = `全 ${totalCards} 件`;

    // 500文字超のcard-bodyを折りたたみ
    document.querySelectorAll('.card-body').forEach(body => {
      if (body.textContent.length > 500) {
        body.classList.add('collapsed');
        const btn = document.createElement('button');
        btn.className = 'read-more-btn';
        btn.textContent = '▼ 続きを読む';
        btn.onclick = () => {
          const isCollapsed = body.classList.contains('collapsed');
          body.classList.toggle('collapsed', !isCollapsed);
          body.classList.toggle('expanded', isCollapsed);
          btn.textContent = isCollapsed ? '▲ 閉じる' : '▼ 続きを読む';
        };
        body.parentElement.insertBefore(btn, body.nextSibling);
      }
    });
  });
</script>

</body>
</html>
